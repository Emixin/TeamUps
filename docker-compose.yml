services:


  redis:
    image: redis:7-alpine
    container_name: teamups-redis

    ports: 
      - "6379:6379"


  db:
    image: postgres:16-alpine
    container_name: teamups-db
    
    volumes:
      - pgdata:/var/lib/postgresql/data

    ports:
      - "5433:5432"

    environment:
      POSTGRES_DB: teamups
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}


  web:
    build: .
    container_name: teamups-web
    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db
      - redis

    environment:
      DB_HOST: db
      DB_NAME: teamups
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis


volumes:
  pgdata:
