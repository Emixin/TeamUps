services:
  db:
    image: postgres:18.1-alpine
    container_name: teamups-db
    
    volumes:
      - pgdata:/var/lib/postgresql

    ports:
      - 5432:5432

    environment:
      POSTGRES-DB: teamups
      POSTGRES-USER: postgres
      POSTGRES-PASSWORD: ${DB_PASSWORD}

  web:
    build: .
    container_name: teamups-web
    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db


volumes:
  pgdata:
