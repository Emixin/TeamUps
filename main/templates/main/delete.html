<!DOCTYPE html>
<html>

<head>
    <title>Delete Account</title>
    {% load static %}
    <link rel="icon" href="{% static 'main/TeamUps.ico' %}">
</head>

<body>

    <form method="post">
        <p>Are You Sure?</p>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Delete My Account!</button>
    </form>

    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

</body>

</html>
