<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    {% load static %}
</head>
<body>
    
    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Change Password</button>
    </form>
    
</body>
</html>
